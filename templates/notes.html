<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заметки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffffff;
        }
        .container {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        h1 {
            text-align: center;
            color: #333;
            font-weight: normal;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 400px;
        }
        .search-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 14px;
        }
        .search-box button {
            padding: 8px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .search-box button:hover {
            background-color: #555;
        }
        .btn {
            padding: 8px 20px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            background-color: #f0f0f0;
            color: #333;
        }
        .btn:hover {
            background-color: #e0e0e0;
        }
        .btn-primary {
            background-color: #333;
            color: white;
            border-color: #333;
        }
        .btn-primary:hover {
            background-color: #555;
        }
        .notes-list {
            margin-top: 20px;
        }
        .note-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 3px;
            border: 1px solid #eee;
        }
        .note-item h3 {
            margin: 0 0 5px 0;
            color: #333;
            font-weight: normal;
        }
        .note-item .note-content {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        .note-item .note-date {
            color: #999;
            font-size: 12px;
            margin: 5px 0;
        }
        .note-item .actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .note-item .actions .btn-sm {
            padding: 5px 15px;
            font-size: 12px;
        }
        .btn-danger {
            color: #c62828;
            border-color: #c62828;
        }
        .btn-danger:hover {
            background-color: #ffebee;
        }
        .btn-view {
            color: #2e7d32;
            border-color: #2e7d32;
        }
        .btn-view:hover {
            background-color: #e8f5e9;
        }
        .empty {
            text-align: center;
            color: #999;
            padding: 40px 0;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 3px;
            text-align: center;
            border: 1px solid #ddd;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-color: #a5d6a7;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            border-color: #ef9a9a;
        }
        .back-link {
            margin-top: 20px;
            text-align: center;
        }
        .back-link a {
            color: #333;
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .loader {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Мои заметки</h1>

        <div class="header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по названию...">
                <button onclick="loadNotes()">Найти</button>
                <button onclick="clearSearch()" style="background-color: #999;">Сброс</button>
            </div>
            <a href="/create_note" class="btn btn-primary">+ Новая заметка</a>
        </div>

        <div id="notesContainer" class="notes-list">
            <div class="loader">Введите текст для поиска</div>
        </div>

        <div id="message"></div>

        <div class="back-link">
            <a href="/profile">← Назад в профиль</a>
        </div>
    </div>

    <script>
        async function loadNotes() {
            const search = document.getElementById('searchInput').value.trim();
            const container = document.getElementById('notesContainer');

            try {
                const url = search ? `/api/notes?search=${encodeURIComponent(search)}` : '/api/notes';
                const response = await fetch(url);

                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Ошибка загрузки заметок');
                }

                const notes = await response.json();

                if (notes.length === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            <p>Заметок не найдено</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = notes.map(note => `
                    <div class="note-item">
                        <h3>${escapeHtml(note.title)}</h3>
                        <div class="note-content">${escapeHtml(note.content)}</div>
                        <div class="note-date">📅 Создано: ${note.created_at}</div>
                        <div class="actions">
                            <a href="/view_note?id=${note.id}" class="btn btn-sm btn-view">Открыть</a>
                            <a href="/edit_note?id=${note.id}" class="btn btn-sm">Редактировать</a>
                            <button onclick="deleteNote(${note.id})" class="btn btn-sm btn-danger">Удалить</button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                container.innerHTML = `<div class="message error">Ошибка загрузки заметок</div>`;
            }
        }

        async function deleteNote(id) {
            if (!confirm('Вы уверены, что хотите удалить эту заметку?')) return;

            try {
                const response = await fetch(`/api/note?id=${id}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    loadNotes();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Ошибка при удалении', 'error');
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            loadNotes();
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message ' + type;
            msgDiv.textContent = text;
            setTimeout(() => {
                msgDiv.className = 'message';
                msgDiv.textContent = '';
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
